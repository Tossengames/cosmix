name: 🎬 Record COSMIX

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-cosmix-v2
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            pulseaudio-utils \
            chromium-browser \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cosmix-v1
          restore-keys: pip-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: ~/.wdm
          key: wdm-${{ runner.os }}-chromium-v1
          restore-keys: wdm-${{ runner.os }}-

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1080x1920x24 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2
          echo "Display started"

      - name: Start PulseAudio
        run: |
          # Kill any existing pulseaudio
          pulseaudio --kill 2>/dev/null || true
          sleep 1
          # Start fresh with no daemon mode first to create config
          mkdir -p ~/.config/pulse
          echo "default-server = unix:/tmp/pulse-socket" > ~/.config/pulse/client.conf
          # Start pulseaudio
          pulseaudio --start --exit-idle-time=-1 --log-target=syslog 2>/dev/null || true
          sleep 2
          # Load a null sink so there is always an audio device
          pactl load-module module-null-sink sink_name=cosmix_sink 2>/dev/null || true
          pactl set-default-sink cosmix_sink 2>/dev/null || true
          pactl load-module module-virtual-source source_name=cosmix_source 2>/dev/null || true
          pactl set-default-source cosmix_source 2>/dev/null || true
          sleep 1
          # Check if running
          pactl info && echo "PulseAudio OK" || echo "PulseAudio not running — will record video only"

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Record
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          output_file = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1080,1920")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_experimental_option("mobileEmulation", {
            "deviceMetrics": {
              "width":      1080,
              "height":     1920,
              "pixelRatio": 1.0
            },
            "userAgent": "Mozilla/5.0 (Linux; Android 12; Pixel 6) AppleWebKit/537.36"
          })

          print(f"Opening {site_url}")
          driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()),
            options=opts
          )
          driver.set_window_size(1080, 1920)
          driver.get(site_url)
          time.sleep(4)

          try:
            driver.execute_script("""
              const btn = document.getElementById('start-btn');
              if (btn) btn.click();
            """)
            print("Clicked START")
          except Exception as e:
            print(f"Note: {e}")

          time.sleep(2)

          driver.execute_script("""
            if (typeof spawnBurst === 'function') spawnBurst();
            setTimeout(function() {
              if (typeof toggleWarp === 'function') toggleWarp();
            }, 1500);
            setTimeout(function() {
              if (typeof spawnBurst === 'function') spawnBurst();
            }, 4000);
            setTimeout(function() {
              if (typeof spawnBurst === 'function') spawnBurst();
            }, 7000);
          """)
          print("Animations triggered — starting recording")

          # Try with audio first, fall back to video only if audio fails
          def try_record(with_audio):
            if with_audio:
              cmd = [
                "ffmpeg", "-y",
                "-f", "x11grab",
                "-video_size", "1080x1920",
                "-framerate", "30",
                "-i", ":99.0",
                "-f", "pulse",
                "-i", "cosmix_sink.monitor",
                "-c:v", "libx264",
                "-preset", "fast",
                "-crf", "20",
                "-c:a", "aac",
                "-b:a", "128k",
                "-t", str(duration),
                "-pix_fmt", "yuv420p",
                "-movflags", "+faststart",
                output_file
              ]
              print("Recording with audio...")
            else:
              cmd = [
                "ffmpeg", "-y",
                "-f", "x11grab",
                "-video_size", "1080x1920",
                "-framerate", "30",
                "-i", ":99.0",
                "-c:v", "libx264",
                "-preset", "fast",
                "-crf", "20",
                "-t", str(duration),
                "-pix_fmt", "yuv420p",
                "-movflags", "+faststart",
                output_file
              ]
              print("Recording video only (no audio)...")

            proc = subprocess.Popen(
              cmd,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE
            )
            time.sleep(duration + 2)
            proc.wait()
            return os.path.exists(output_file) and os.path.getsize(output_file) > 10000

          # Try audio first
          success = try_record(with_audio=True)

          # If that failed try video only
          if not success:
            print("Audio recording failed — retrying video only")
            if os.path.exists(output_file):
              os.remove(output_file)
            success = try_record(with_audio=False)

          driver.quit()

          if success:
            mb = os.path.getsize(output_file) / 1024 / 1024
            print(f"Recording complete! {mb:.1f} MB → {output_file}")
          else:
            raise FileNotFoundError("Both recording attempts failed")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: /tmp/cosmix_*.mp4
          retention-days: 14