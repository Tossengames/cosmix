name: 🎬 Record COSMIX

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"
  schedule:
    - cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-cosmix-v8

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            pulseaudio-utils \
            chromium-browser \
            xdotool \
            libnss3 \
            libgbm1 \
            libasound2 \
            dbus-x11

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cosmix-v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: ~/.wdm
          key: wdm-ubuntu22-v4

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          echo "Xvfb ready"

      - name: Start PulseAudio
        run: |
          pulseaudio --kill 2>/dev/null || true
          sleep 1
          pulseaudio \
            --start \
            --exit-idle-time=-1 \
            --log-target=syslog \
            --log-level=error 2>/dev/null || true
          sleep 3
          pactl load-module module-null-sink \
            sink_name=vsink \
            sink_properties=device.description=VirtualSpeaker
          sleep 1
          pactl set-default-sink vsink
          pactl set-default-source vsink.monitor
          sleep 1
          echo "=== Default sink ==="
          pactl info | grep "Default Sink"
          echo "=== Default source ==="
          pactl info | grep "Default Source"
          echo "PulseAudio ready"

      - name: Record COSMIX
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          output_file = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          env = os.environ.copy()
          env["DISPLAY"] = ":99"
          env["PULSE_SERVER"] = "unix:/run/user/1001/pulse/native"

          # ── Launch Chrome ──
          print("Launching Chrome...")
          chrome = subprocess.Popen([
            "chromium-browser",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--disable-gpu",
            "--window-size=1920,1080",
            "--window-position=0,0",
            "--autoplay-policy=no-user-gesture-required",
            "--disable-backgrounding-occluded-windows",
            "--disable-renderer-backgrounding",
            "--disable-background-timer-throttling",
            "--disable-background-media-suspend",
            "--no-first-run",
            "--no-default-browser-check",
            "--disable-extensions",
            "--disable-infobars",
            "--disable-notifications",
            "--alsa-output-device=pulse",
            f"--app={site_url}",
          ], env=env, stderr=subprocess.DEVNULL, stdout=subprocess.DEVNULL)

          # ── Wait 5 seconds for page load ──
          print("Waiting for page load (5s)...")
          time.sleep(5)

          # ── Click START ──
          print("Clicking START...")
          subprocess.run(["xdotool", "mousemove", "960", "540"], env=env)
          time.sleep(0.5)
          subprocess.run(["xdotool", "click", "1"], env=env)
          time.sleep(0.5)
          subprocess.run(["xdotool", "click", "1"], env=env)
          print("START clicked — starting recording immediately...")
          time.sleep(1)

          # ── Start recording right after START click ──
          print(f"Recording {duration}s with audio...")
          ffmpeg = subprocess.Popen([
            "ffmpeg", "-y",
            "-f", "x11grab",
            "-video_size", "1920x1080",
            "-framerate", "30",
            "-i", ":99.0+0,0",
            "-f", "pulse",
            "-i", "vsink.monitor",
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-c:a", "aac",
            "-b:a", "192k",
            "-t", str(duration),
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            "-async", "1",
            output_file
          ], env=env, stdout=subprocess.PIPE, stderr=subprocess.PIPE)

          # ── Click every second during recording ──
          elapsed = 0
          while elapsed < duration:
            x = random.randint(100, 1820)
            y = random.randint(100, 980)
            subprocess.run(["xdotool", "mousemove", str(x), str(y)], env=env)
            subprocess.run(["xdotool", "click", "1"], env=env)
            time.sleep(1)
            elapsed += 1
          time.sleep(2)
          ffmpeg.wait()

          stderr = ffmpeg.stderr.read().decode("utf-8", errors="ignore")
          ok = os.path.exists(output_file) and os.path.getsize(output_file) > 50000

          if not ok:
            print("Audio recording failed. Error:")
            print(stderr[-800:])
            print("Retrying video only...")
            if os.path.exists(output_file):
              os.remove(output_file)
            ffmpeg2 = subprocess.Popen([
              "ffmpeg", "-y",
              "-f", "x11grab",
              "-video_size", "1920x1080",
              "-framerate", "30",
              "-i", ":99.0+0,0",
              "-c:v", "libx264",
              "-preset", "fast",
              "-crf", "18",
              "-t", str(duration),
              "-pix_fmt", "yuv420p",
              "-movflags", "+faststart",
              output_file
            ], env=env, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
            time.sleep(duration + 2)
            ffmpeg2.wait()
            ok = os.path.exists(output_file) and os.path.getsize(output_file) > 50000
            if ok:
              print("Video only backup succeeded")

          chrome.terminate()

          if ok:
            mb = os.path.getsize(output_file) / 1024 / 1024
            print(f"SUCCESS — {mb:.1f} MB → {output_file}")
          else:
            print("ffmpeg output:")
            print(stderr[-1000:])
            raise RuntimeError("Recording failed")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: /tmp/cosmix_*.mp4
          retention-days: 14