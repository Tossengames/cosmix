name: 🎬 Record COSMIX

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"
  schedule:
    - cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [ ! -f /usr/bin/Xvfb ]; then
            sudo apt-get update -qq
            sudo apt-get install -y \
              xvfb \
              pulseaudio \
              pulseaudio-utils \
              dbus-x11
          else
            echo "Already installed"
          fi

      - name: Cache pip and ChromeDriver
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Start PulseAudio
        run: |
          pulseaudio --kill 2>/dev/null || true
          sleep 1
          pulseaudio --start --exit-idle-time=-1 --log-level=error 2>/dev/null || true
          sleep 3
          pactl load-module module-null-sink sink_name=vsink sink_properties=device.description=VirtualSpeaker
          sleep 1
          pactl set-default-sink vsink
          pactl set-default-source vsink.monitor

      - name: Record COSMIX
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, shutil
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.common.by import By
          from webdriver_manager.chrome import ChromeDriverManager

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          output_file = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          env = os.environ.copy()
          env["DISPLAY"] = ":99"

          chrome_bin = (
            shutil.which("google-chrome-stable") or
            shutil.which("google-chrome") or
            shutil.which("chromium-browser") or
            shutil.which("chromium")
          )
          print(f"Chrome: {chrome_bin}")

          opts = Options()
          if chrome_bin:
            opts.binary_location = chrome_bin
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-background-media-suspend")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-extensions")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")

          driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()),
            options=opts
          )
          driver.set_window_size(1920, 1080)
          driver.get(site_url)

          WebDriverWait(driver, 30).until(
            EC.presence_of_element_located((By.ID, "start-btn"))
          )
          time.sleep(2)

          driver.execute_script("document.getElementById('start-btn').click();")
          time.sleep(0.5)
          driver.execute_script("startExperience();")
          time.sleep(1)

          driver.execute_script("spawnBurst();")
          time.sleep(0.5)
          driver.execute_script("toggleWarp();")
          time.sleep(0.5)

          driver.save_screenshot("/tmp/screen_before_record.png")

          ffmpeg = subprocess.Popen([
            "ffmpeg", "-y",
            "-f", "x11grab",
            "-video_size", "1920x1080",
            "-framerate", "30",
            "-i", ":99.0+0,0",
            "-f", "pulse",
            "-i", "vsink.monitor",
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-c:a", "aac",
            "-b:a", "192k",
            "-t", str(duration),
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            "-async", "1",
            output_file
          ], env=env, stdout=subprocess.PIPE, stderr=subprocess.PIPE)

          for i in range(duration):
            try:
              driver.execute_script(f"""
                handleInteraction(
                  {random.randint(100, 1820)},
                  {random.randint(100, 980)}
                );
              """)
              if i == duration // 2:
                driver.execute_script("spawnBurst();")
            except:
              pass
            time.sleep(1)

          time.sleep(2)
          ffmpeg.wait()

          stderr = ffmpeg.stderr.read().decode("utf-8", errors="ignore")
          ok = os.path.exists(output_file) and os.path.getsize(output_file) > 50000

          if not ok:
            print(stderr[-800:])
            if os.path.exists(output_file):
              os.remove(output_file)
            ffmpeg2 = subprocess.Popen([
              "ffmpeg", "-y",
              "-f", "x11grab",
              "-video_size", "1920x1080",
              "-framerate", "30",
              "-i", ":99.0+0,0",
              "-c:v", "libx264",
              "-preset", "fast",
              "-crf", "18",
              "-t", str(duration),
              "-pix_fmt", "yuv420p",
              "-movflags", "+faststart",
              output_file
            ], env=env, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
            time.sleep(duration + 2)
            ffmpeg2.wait()
            ok = os.path.exists(output_file) and os.path.getsize(output_file) > 50000

          driver.quit()

          if ok:
            mb = os.path.getsize(output_file) / 1024 / 1024
            print(f"SUCCESS — {mb:.1f} MB → {output_file}")
          else:
            print(stderr[-1000:])
            raise RuntimeError("Recording failed")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: |
            /tmp/cosmix_*.mp4
            /tmp/screen_before_record.png
          retention-days: 14