name: 🎬 Record COSMIX

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"
  schedule:
    - cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-cosmix-v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            x11vnc \
            pulseaudio \
            pulseaudio-utils \
            chromium-browser \
            xdotool \
            libnss3 \
            libgbm1 \
            libasound2

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cosmix-v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: ~/.wdm
          key: wdm-ubuntu22-v2

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Record COSMIX
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, signal

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          output_file = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          # ── 1. Start Xvfb virtual display ──────────────────────
          print("Starting Xvfb...")
          xvfb = subprocess.Popen([
            "Xvfb", ":99",
            "-screen", "0", "1080x1920x24",
            "-ac", "-nolisten", "tcp"
          ])
          time.sleep(2)

          env = os.environ.copy()
          env["DISPLAY"] = ":99"

          # ── 2. Start PulseAudio with null sink ─────────────────
          print("Starting PulseAudio...")
          subprocess.run(["pulseaudio", "--kill"], capture_output=True)
          time.sleep(1)
          subprocess.Popen(
            ["pulseaudio", "--start", "--exit-idle-time=-1"],
            env=env
          )
          time.sleep(2)
          subprocess.run(
            ["pactl", "load-module", "module-null-sink",
             "sink_name=vsink"],
            env=env, capture_output=True
          )
          subprocess.run(
            ["pactl", "set-default-sink", "vsink"],
            env=env, capture_output=True
          )
          subprocess.run(
            ["pactl", "set-default-source", "vsink.monitor"],
            env=env, capture_output=True
          )
          time.sleep(1)

          # ── 3. Launch Chrome NON-headless on Xvfb display ──────
          # This is the key fix — no --headless so canvas renders properly
          print("Launching Chrome on virtual display...")
          chrome = subprocess.Popen([
            "chromium-browser",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--disable-gpu",
            "--window-size=1080,1920",
            "--window-position=0,0",
            "--force-device-scale-factor=1",
            "--autoplay-policy=no-user-gesture-required",
            "--disable-backgrounding-occluded-windows",
            "--disable-renderer-backgrounding",
            "--disable-background-timer-throttling",
            "--disable-background-media-suspend",
            "--no-first-run",
            "--no-default-browser-check",
            "--disable-translate",
            "--disable-extensions",
            "--disable-infobars",
            "--disable-notifications",
            f"--app={site_url}",
          ], env=env)

          # ── 4. Wait for page to fully load ─────────────────────
          print("Waiting for page load (8s)...")
          time.sleep(8)

          # ── 5. Click START button using xdotool ────────────────
          # xdotool simulates a real mouse click at the center of screen
          # The start button is centered on screen
          print("Clicking START button...")
          subprocess.run([
            "xdotool", "mousemove", "--sync", "540", "960"
          ], env=env)
          time.sleep(0.5)
          subprocess.run([
            "xdotool", "click", "1"
          ], env=env)
          print("Clicked center of screen (START button)")

          # ── 6. Wait for splash to fade and sky to animate ──────
          print("Waiting for animations (6s)...")
          time.sleep(6)

          # ── 7. Click a few random spots to trigger explosions ──
          import random
          for _ in range(3):
            x = random.randint(200, 880)
            y = random.randint(300, 1600)
            subprocess.run(["xdotool", "mousemove", str(x), str(y)], env=env)
            time.sleep(0.3)
            subprocess.run(["xdotool", "click", "1"], env=env)
            time.sleep(0.5)

          # ── 8. Now record ──────────────────────────────────────
          print(f"Recording {duration}s...")
          ffmpeg = subprocess.Popen([
            "ffmpeg", "-y",
            "-f", "x11grab",
            "-display", ":99",
            "-video_size", "1080x1920",
            "-framerate", "30",
            "-i", ":99.0+0,0",
            "-f", "pulse",
            "-i", "vsink.monitor",
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-c:a", "aac",
            "-b:a", "128k",
            "-t", str(duration),
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            output_file
          ], env=env, stdout=subprocess.PIPE, stderr=subprocess.PIPE)

          # Keep clicking during recording so it stays active
          half = duration // 2
          time.sleep(half)
          for _ in range(4):
            x = random.randint(100, 980)
            y = random.randint(200, 1700)
            subprocess.run(["xdotool", "mousemove", str(x), str(y)], env=env)
            time.sleep(0.2)
            subprocess.run(["xdotool", "click", "1"], env=env)
            time.sleep(0.4)

          time.sleep(duration - half + 2)
          ffmpeg.wait()

          # Check result
          stderr = ffmpeg.stderr.read().decode("utf-8", errors="ignore")
          if ffmpeg.returncode != 0:
            print("ffmpeg stderr (last 1000 chars):")
            print(stderr[-1000:])

          # Retry video-only if audio failed
          if not os.path.exists(output_file) or os.path.getsize(output_file) < 50000:
            print("Retrying without audio...")
            if os.path.exists(output_file):
              os.remove(output_file)
            ffmpeg2 = subprocess.Popen([
              "ffmpeg", "-y",
              "-f", "x11grab",
              "-display", ":99",
              "-video_size", "1080x1920",
              "-framerate", "30",
              "-i", ":99.0+0,0",
              "-c:v", "libx264",
              "-preset", "fast",
              "-crf", "18",
              "-t", str(duration),
              "-pix_fmt", "yuv420p",
              "-movflags", "+faststart",
              output_file
            ], env=env)
            time.sleep(duration + 2)
            ffmpeg2.wait()

          # Cleanup
          chrome.terminate()
          xvfb.terminate()

          if os.path.exists(output_file) and os.path.getsize(output_file) > 50000:
            mb = os.path.getsize(output_file) / 1024 / 1024
            print(f"SUCCESS — {mb:.1f} MB saved to {output_file}")
          else:
            raise RuntimeError("Recording failed or file too small")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: /tmp/cosmix_*.mp4
          retention-days: 14