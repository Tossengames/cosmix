name: 🎬 Record COSMIX

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-cosmix-v3
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            pulseaudio-utils \
            chromium-browser \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cosmix-v1
          restore-keys: pip-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: ~/.wdm
          key: wdm-${{ runner.os }}-chromium-v1
          restore-keys: wdm-${{ runner.os }}-

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1080x1920x24 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          echo "Display ready"

      - name: Start PulseAudio with null sink
        run: |
          pulseaudio --kill 2>/dev/null || true
          sleep 1
          pulseaudio --start \
            --exit-idle-time=-1 \
            --log-target=syslog 2>/dev/null || true
          sleep 3
          pactl load-module module-null-sink \
            sink_name=virtual_sink \
            sink_properties=device.description=VirtualSink 2>/dev/null || true
          sleep 1
          pactl set-default-sink virtual_sink 2>/dev/null || true
          pactl set-default-source virtual_sink.monitor 2>/dev/null || true
          sleep 1
          echo "--- Sinks ---"
          pactl list sinks short 2>/dev/null || echo "pactl failed"
          echo "--- Sources ---"
          pactl list sources short 2>/dev/null || echo "pactl failed"

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Record
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          output_file = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1080,1920")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--run-all-compositor-stages-before-draw")
          opts.add_experimental_option("mobileEmulation", {
            "deviceMetrics": {
              "width":      1080,
              "height":     1920,
              "pixelRatio": 1.0
            },
            "userAgent": "Mozilla/5.0 (Linux; Android 12; Pixel 6) AppleWebKit/537.36"
          })

          print("Starting Chrome...")
          driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()),
            options=opts
          )
          driver.set_window_size(1080, 1920)

          print(f"Loading {site_url}")
          driver.get(site_url)

          print("Waiting for page to fully load...")
          time.sleep(6)

          try:
            driver.execute_script("""
              const btn = document.getElementById('start-btn');
              if (btn) {
                btn.click();
                console.log('START clicked');
              } else {
                console.log('START button not found');
              }
            """)
            print("Clicked START button")
          except Exception as e:
            print(f"Click error: {e}")

          print("Waiting for animations to start...")
          time.sleep(5)

          driver.execute_script("""
            if (typeof spawnBurst === 'function') spawnBurst();
          """)
          time.sleep(1)

          print("Starting ffmpeg recording...")

          cmd_video_only = [
            "ffmpeg", "-y",
            "-f", "x11grab",
            "-video_size", "1080x1920",
            "-framerate", "30",
            "-i", ":99.0",
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-t", str(duration),
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            output_file
          ]

          cmd_with_audio = [
            "ffmpeg", "-y",
            "-f", "x11grab",
            "-video_size", "1080x1920",
            "-framerate", "30",
            "-i", ":99.0",
            "-f", "pulse",
            "-i", "virtual_sink.monitor",
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-c:a", "aac",
            "-b:a", "128k",
            "-t", str(duration),
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            output_file
          ]

          def run_ffmpeg(cmd, label):
            print(f"Trying: {label}")
            proc = subprocess.Popen(
              cmd,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE
            )
            half = duration // 2
            time.sleep(half)
            try:
              driver.execute_script("""
                if (typeof spawnBurst === 'function') spawnBurst();
                if (typeof toggleWarp  === 'function') toggleWarp();
              """)
            except:
              pass
            time.sleep(duration - half + 2)
            proc.wait()
            stderr = proc.stderr.read().decode("utf-8", errors="ignore")
            if proc.returncode != 0:
              print(f"ffmpeg error:\n{stderr[-800:]}")
            ok = os.path.exists(output_file) and os.path.getsize(output_file) > 50000
            if ok:
              mb = os.path.getsize(output_file) / 1024 / 1024
              print(f"{label} succeeded — {mb:.1f} MB")
            return ok

          success = run_ffmpeg(cmd_with_audio, "video+audio")

          if not success:
            print("Audio failed — retrying video only")
            if os.path.exists(output_file):
              os.remove(output_file)
            success = run_ffmpeg(cmd_video_only, "video only")

          driver.quit()

          if not success:
            raise RuntimeError("Recording failed on both attempts")

          print(f"Saved to {output_file}")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: /tmp/cosmix_*.mp4
          retention-days: 14