name: 🎬 Record COSMIX

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration in seconds"
        required: false
        default: "10"
  schedule:
    - cron: "0 10 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-cosmix-v11

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            chromium-browser \
            libnss3 \
            libgbm1 \
            libasound2 \
            ffmpeg

      - name: Cache pip and ChromeDriver
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 390x844x24 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record via canvas captureStream
        run: |
          python3 << 'PYEOF'
          import os, time, base64, subprocess, random
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.common.by import By
          from webdriver_manager.chrome import ChromeDriverManager

          duration    = int(os.environ.get("DURATION", "10"))
          ts          = os.environ.get("TS", "test")
          webm_file   = f"/tmp/cosmix_{ts}.webm"
          mp4_file    = f"/tmp/cosmix_{ts}.mp4"
          site_url    = "https://tossengames.github.io/cosmix/"

          env = os.environ.copy()
          env["DISPLAY"] = ":99"

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=390,844")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-background-media-suspend")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-extensions")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--enable-usermedia-screen-capturing")
          opts.add_argument("--allow-http-screen-capture")
          opts.add_experimental_option("mobileEmulation", {
            "deviceMetrics": {
              "width": 390,
              "height": 844,
              "pixelRatio": 1.0
            },
            "userAgent": "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1"
          })

          print("Starting Chrome...")
          driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()),
            options=opts
          )
          driver.set_window_size(390, 844)

          print(f"Loading {site_url}")
          driver.get(site_url)

          print("Waiting for start-btn...")
          WebDriverWait(driver, 30).until(
            EC.presence_of_element_located((By.ID, "start-btn"))
          )
          time.sleep(2)

          print("Clicking start-btn...")
          driver.execute_script("document.getElementById('start-btn').click();")
          time.sleep(0.5)
          driver.execute_script("startExperience();")
          time.sleep(1)

          driver.execute_script("spawnBurst();")
          time.sleep(0.3)
          driver.execute_script("toggleWarp();")
          time.sleep(0.5)

          driver.save_screenshot("/tmp/screen_before_record.png")
          print("Starting canvas recording...")

          driver.execute_script("window.startRecording(30);")
          print(f"Recording {duration}s via canvas captureStream...")

          for i in range(duration):
            try:
              driver.execute_script(f"""
                handleInteraction(
                  {random.randint(20, 370)},
                  {random.randint(50, 800)}
                );
              """)
              if i == duration // 3:
                driver.execute_script("spawnBurst();")
              if i == (duration * 2) // 3:
                driver.execute_script("spawnBurst(); toggleWarp();")
            except:
              pass
            time.sleep(1)

          driver.execute_script("window.stopRecording();")
          print("Waiting for recording to finalize...")

          for attempt in range(20):
            done = driver.execute_script("return window._recordingDone === true;")
            if done:
              break
            time.sleep(0.5)
          print(f"Recording done: {done}")

          print("Extracting video from browser...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64()
              .then(b64 => done(b64))
              .catch(e => done(null));
          """)

          driver.quit()

          if not b64:
            raise RuntimeError("Failed to get recording from browser")

          video_bytes = base64.b64decode(b64)
          with open(webm_file, 'wb') as f:
            f.write(video_bytes)
          print(f"Webm saved: {os.path.getsize(webm_file)/1024/1024:.1f} MB")

          print("Converting to mp4...")
          result = subprocess.run([
            "ffmpeg", "-y",
            "-i", webm_file,
            "-c:v", "libx264",
            "-preset", "fast",
            "-crf", "18",
            "-c:a", "aac",
            "-b:a", "192k",
            "-pix_fmt", "yuv420p",
            "-movflags", "+faststart",
            mp4_file
          ], capture_output=True, text=True)

          if os.path.exists(mp4_file) and os.path.getsize(mp4_file) > 10000:
            mb = os.path.getsize(mp4_file) / 1024 / 1024
            print(f"SUCCESS — {mb:.1f} MB → {mp4_file}")
          else:
            print("ffmpeg stderr:", result.stderr[-500:])
            print("Using webm as fallback")
          PYEOF
        env:
          DURATION: ${{ github.event.inputs.duration || '10' }}
          TS: ${{ env.TS }}

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosmix-${{ env.TS }}
          path: |
            /tmp/cosmix_*.mp4
            /tmp/cosmix_*.webm
            /tmp/screen_before_record.png
          retention-days: 14